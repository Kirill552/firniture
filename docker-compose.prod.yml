name: furniture-ai-prod

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-furniture_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:7.2-alpine@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend


  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend


# IMAGE_TAG is a lowercase 40-64 character release commit SHA, never an alias.
  api:
    image: ghcr.io/kirill552/firniture/api:${IMAGE_TAG:?IMAGE_TAG must be set}
    restart: unless-stopped
    environment:
      APP_ENVIRONMENT: production
      MOCK_MODE: ${MOCK_MODE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-furniture_ai}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      GUEST_UPLOAD_SECRET: ${GUEST_UPLOAD_SECRET:?GUEST_UPLOAD_SECRET must be set}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-ru-central1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-mebel-ai-artifacts}
      S3_PRESIGNED_TTL_SECONDS: 900
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_API_KEY: ${AI_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-deepseek/deepseek-chat-v3-0324}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-google/gemini-2.0-flash-001}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      RUSENDER_API_KEY: ${RUSENDER_API_KEY:-}
      RUSENDER_SENDING_KEY_ID: ${RUSENDER_SENDING_KEY_ID:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@avtoraskroy.ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import socket; checks = (("127.0.0.1", 8000), ("postgres", 5432),
          ("redis", 6379), ("minio", 9000)); [socket.create_connection(address,
          timeout=2).close() for address in checks]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
      - proxy


  worker:
    image: ghcr.io/kirill552/firniture/api:${IMAGE_TAG:?IMAGE_TAG must be set}
    restart: unless-stopped
    command: [".venv/bin/python", "-m", "api.worker"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-furniture_ai}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-ru-central1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-mebel-ai-artifacts}
      S3_PRESIGNED_TTL_SECONDS: 900
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    networks:
      - backend

  web:
    image: ghcr.io/kirill552/firniture/web:${IMAGE_TAG:?IMAGE_TAG must be set}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy


volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:

networks:
  backend:
  proxy:
