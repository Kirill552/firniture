name: Deploy to Production (Main)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image (immutable SHA tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ghcr.io/kirill552/firniture/api:${{ github.sha }}

      - name: Build and push Web image (immutable SHA tag)
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ghcr.io/kirill552/firniture/web:${{ github.sha }}

      - name: Generate release manifest
        id: manifest
        run: |
          cat > release-manifest.json <<EOF
          {
            "release_sha": "${{ github.sha }}",
            "images": {
              "api": "ghcr.io/kirill552/firniture/api:${{ github.sha }}",
              "web": "ghcr.io/kirill552/firniture/web:${{ github.sha }}",
              "worker": "ghcr.io/kirill552/firniture/api:${{ github.sha }}"
            }
          }
          EOF
          echo "manifest_path=release-manifest.json" >> $GITHUB_OUTPUT

      - name: Validate release manifest (local)
        run: |
          python deploy/release_manifest.py ${{ steps.manifest.outputs.manifest_path }} ${{ github.sha }} < <(echo -e "ghcr.io/kirill552/firniture/api:${{ github.sha }}\nghcr.io/kirill552/firniture/api:${{ github.sha }}\nghcr.io/kirill552/firniture/web:${{ github.sha }}")

      - name: Deploy to server via SSH (uses deploy script + manifest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GUEST_UPLOAD_SECRET,RUSENDER_API_KEY,RUSENDER_SENDING_KEY_ID
          script: |
            set -Eeuo pipefail
            cd ~/mebel-ai
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            touch .env
            upsert_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '\n%s=%s\n' "$key" "$value" >> .env
              fi
            }
            upsert_env GUEST_UPLOAD_SECRET "$GUEST_UPLOAD_SECRET"
            upsert_env RUSENDER_API_KEY "$RUSENDER_API_KEY"
            if [ -n "$RUSENDER_SENDING_KEY_ID" ]; then
              upsert_env RUSENDER_SENDING_KEY_ID "$RUSENDER_SENDING_KEY_ID"
            fi
            upsert_env FRONTEND_URL "https://avtoraskroy.ru"
            upsert_env EMAIL_FROM "noreply@avtoraskroy.ru"

            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username Kirill552 --password-stdin

            manifest="/tmp/release-manifest-${{ github.sha }}.json"
            cat > "$manifest" <<'MANIFEST'
            {
              "release_sha": "${{ github.sha }}",
              "images": {
                "api": "ghcr.io/kirill552/firniture/api:${{ github.sha }}",
                "web": "ghcr.io/kirill552/firniture/web:${{ github.sha }}",
                "worker": "ghcr.io/kirill552/firniture/api:${{ github.sha }}"
              }
            }
            MANIFEST

            IMAGE_TAG=${{ github.sha }} bash ./deploy/deploy.sh \
              --release-sha ${{ github.sha }} \
              --manifest "$manifest" \
              --compose-file docker-compose.prod.yml \
              --backup-command "mkdir -p \"\$HOME/mebel-ai-deploy-backups\"; cp -p docker-compose.prod.yml \"\$HOME/mebel-ai-deploy-backups/docker-compose.prod.yml.${{ github.sha }}\""

            rm -f "$manifest"
        env:
          GHCR_TOKEN: ${{ secrets.GH_PAT }}
          GUEST_UPLOAD_SECRET: ${{ secrets.GUEST_UPLOAD_SECRET }}
          RUSENDER_API_KEY: ${{ secrets.RUSENDER_API_KEY }}
          RUSENDER_SENDING_KEY_ID: ${{ secrets.RUSENDER_SENDING_KEY_ID }}

      - name: (Optional) Dry-run deploy script locally in CI
        run: |
          bash deploy/deploy.sh --release-sha ${{ github.sha }} --manifest ${{ steps.manifest.outputs.manifest_path }} --compose-file docker-compose.prod.yml --backup-command "true" --dry-run || true
          echo "Dry-run of deploy script executed (no side effects)."
