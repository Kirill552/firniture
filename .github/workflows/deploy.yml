name: Deploy to Production (Main)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image (immutable SHA tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ghcr.io/kirill552/firniture/api:${{ github.sha }}

      - name: Build and push Web image (immutable SHA tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ghcr.io/kirill552/firniture/web:${{ github.sha }}

      - name: Generate release manifest
        id: manifest
        run: |
          cat > release-manifest.json <<EOF
          {
            "release_sha": "${{ github.sha }}",
            "images": {
              "api": "ghcr.io/kirill552/firniture/api:${{ github.sha }}",
              "web": "ghcr.io/kirill552/firniture/web:${{ github.sha }}",
              "worker": "ghcr.io/kirill552/firniture/api:${{ github.sha }}"
            }
          }
          EOF
          echo "manifest_path=release-manifest.json" >> $GITHUB_OUTPUT

      - name: Validate release manifest (local)
        run: |
          python deploy/release_manifest.py ${{ steps.manifest.outputs.manifest_path }} ${{ github.sha }} < <(echo -e "ghcr.io/kirill552/firniture/api:${{ github.sha }}\nghcr.io/kirill552/firniture/api:${{ github.sha }}\nghcr.io/kirill552/firniture/web:${{ github.sha }}")

      - name: Deploy to server via SSH (uses deploy script + manifest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/mebel-ai
            git fetch origin
            git checkout main
            git pull origin main
            # Example: would use the deploy script with manifest and backup
            # IMAGE_TAG=${{ github.sha }} ./deploy/deploy.sh --release-sha ${{ github.sha }} --manifest /path/release-manifest.json --backup-command "./deploy/backup.sh ..." --dry-run || true
            # Real execution requires SSH + approvals + backup (human controlled)
            echo "Release SHA: ${{ github.sha }}"
            echo "Manifest validated locally in CI. Full deploy/rollback/backup requires production credentials and approvals."
            docker compose -f docker-compose.prod.yml config --quiet || echo "compose config requires IMAGE_TAG in prod env"

      - name: (Optional) Dry-run deploy script locally in CI
        run: |
          bash deploy/deploy.sh --release-sha ${{ github.sha }} --manifest ${{ steps.manifest.outputs.manifest_path }} --compose-file docker-compose.prod.yml --backup-command "true" --dry-run || true
          echo "Dry-run of deploy script executed (no side effects)."