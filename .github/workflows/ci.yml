name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync dev (for ruff)
        run: uv sync --dev
      - name: Ruff check (strict, no bypass)
        run: uv run python -m ruff check api shared tests --output-format=concise
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_only_password
          POSTGRES_DB: furniture_ai_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d furniture_ai_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests (hermetic, no network, coverage gate)
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5434
          POSTGRES_DB: furniture_ai_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_only_password
          REDIS_URL: redis://127.0.0.1:6381/0
          AI_API_KEY: ""
          RUSENDER_API_KEY: ""
        run: uv run python -m pytest -q --cov=api --cov-report=term-missing --cov-fail-under=80

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint

  frontend-build:
    runs-on: ubuntu-latest
    needs: [frontend-typecheck, frontend-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Build for e2e (production-like)
        working-directory: web
        run: npm run build
      - name: Run e2e tests (CI profile)
        working-directory: web
        env:
          CI: "true"
        run: npm run test:e2e:ci

  backend-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_only_password
          POSTGRES_DB: furniture_ai_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d furniture_ai_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install deps
        run: uv sync --dev
      - name: Migration up / down / up (no data loss check)
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5434
          POSTGRES_DB: furniture_ai_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_only_password
        run: |
          uv run python -m alembic upgrade head
          uv run python -m alembic downgrade -1
          uv run python -m alembic upgrade head

  openapi-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install deps
        run: uv sync --dev
      - name: OpenAPI contract / drift check
        run: uv run python -m pytest tests/test_openapi_contract.py -q --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image (prod context)
        run: docker build -f api/Dockerfile -t furniture-ai-api:test .
      - name: Build web image if Dockerfile present
        run: |
          if [ -f web/Dockerfile ]; then docker build -f web/Dockerfile -t furniture-ai-web:test ./web; else echo "web Dockerfile optional, skipped"; fi
