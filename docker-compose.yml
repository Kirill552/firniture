name: furniture-ai

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: furniture_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      APP_ENVIRONMENT: development
      MOCK_MODE: "true"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: furniture_ai
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      REDIS_URL: redis://redis:6379/0
      GUEST_UPLOAD_SECRET: ${GUEST_UPLOAD_SECRET:-}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: artifacts
      S3_PRESIGNED_TTL_SECONDS: 900
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_API_KEY: ${AI_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-deepseek/deepseek-chat-v3-0324}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-google/gemini-2.0-flash-001}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-openai/text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: ["uv", "run", "python", "-m", "api.worker"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: furniture_ai
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: artifacts
      S3_PRESIGNED_TTL_SECONDS: 900
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  pgdata:
  miniodata:
